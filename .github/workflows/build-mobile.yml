name: Build Mobile Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0) or "auto" to increment patch'
        required: false
        default: 'auto'
      android_content:
        description: 'Android: what to deploy'
        required: false
        default: 'none'
        type: choice
        options:
          - none             # skip Android entirely
          - all              # build + upload + metadata + screenshots
          - metadata_only    # texts/descriptions only (no build, no upload, no screenshots)
          - screenshots_only # screenshots only (no build, no upload, no texts)
          - app_only         # build + upload only (no metadata, no screenshots)
      ios_content:
        description: 'iOS: what to deploy'
        required: false
        default: 'none'
        type: choice
        options:
          - none             # skip iOS entirely
          - all              # build + TestFlight + metadata + screenshots
          - metadata_only    # texts/descriptions only (no build, no TestFlight, no screenshots)
          - screenshots_only # screenshots only (no build, no TestFlight, no texts)
          - app_only         # build + TestFlight only (no metadata, no screenshots)

permissions:
  contents: write
  actions: write
  id-token: write

jobs:
  version:
    name: Derive version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Derive build version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          INPUT="${{ inputs.version }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "auto" ]; then
            LATEST=$(gh release list --limit 10 --json tagName \
              --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first | .tagName' 2>/dev/null || echo "")
            if [ -z "$LATEST" ]; then
              TAG="v0.1.0"
              echo "No previous release found — starting at $TAG"
            else
              MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\1/')
              MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\2/')
              PATCH=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)\.\([0-9]*\)/\3/')
              PATCH=$((PATCH + 1))
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Previous release: $LATEST → auto-increment to $TAG"
            fi
          else
            TAG="$INPUT"
            [[ "$TAG" != v* ]] && TAG="v$TAG"
            echo "Using manual version: $TAG"
          fi
          VERSION_CLEAN="${TAG#v}"
          echo "version=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-android:
    name: Build Android AAB
    needs: version
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.android_content != 'none' &&
      github.event.inputs.android_content != '' &&
      github.event.inputs.android_content != 'metadata_only' &&
      github.event.inputs.android_content != 'screenshots_only'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Validate Android secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          if [ -z "$PLAY_STORE_JSON_KEY" ]; then
            echo "::error::PLAY_STORE_JSON_KEY secret is not set"
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"; exit 1; fi
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then echo "::error::ANDROID_KEYSTORE_PASSWORD secret is not set"; exit 1; fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then echo "::error::ANDROID_KEY_PASSWORD secret is not set"; exit 1; fi
          if [ -z "$ANDROID_KEY_ALIAS" ]; then echo "::error::ANDROID_KEY_ALIAS secret is not set"; exit 1; fi
          echo "All required Android secrets are present"

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > flutter_app/android/app/upload-keystore.jks

      - name: Create key.properties
        working-directory: flutter_app/android
        run: |
          cat > key.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android AAB
        working-directory: flutter_app
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Verify AAB exists
        run: |
          AAB_PATH="flutter_app/build/app/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "::error::AAB file not found at $AAB_PATH"
            exit 1
          fi
          echo "AAB built successfully: $(ls -la $AAB_PATH)"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          rm -f flutter_app/android/app/upload-keystore.jks
          rm -f flutter_app/android/key.properties

  build-ios:
    name: Build iOS IPA
    needs: version
    runs-on: [self-hosted, macOS, ARM64]
    if: |
      github.event.inputs.ios_content != 'none' &&
      github.event.inputs.ios_content != '' &&
      github.event.inputs.ios_content != 'metadata_only' &&
      github.event.inputs.ios_content != 'screenshots_only'
    steps:
      - name: Update local git mirror
        run: |
          set -euo pipefail
          MIRROR="$HOME/actions-runner-yoloit/mirror/flutter_agent_harness.git"
          mkdir -p "$(dirname "$MIRROR")"
          if [ ! -d "$MIRROR" ]; then
            git clone --mirror https://github.com/IstiN/flutter_agent_harness.git "$MIRROR"
          else
            git -C "$MIRROR" fetch origin
          fi

      - name: Checkout repository from local mirror
        run: |
          set -euo pipefail
          MIRROR="$HOME/actions-runner-yoloit/mirror/flutter_agent_harness.git"
          cd /tmp
          rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"
          git clone --reference "$MIRROR" --depth=1 \
            https://github.com/IstiN/flutter_agent_harness.git "$GITHUB_WORKSPACE"
          echo "Checked out: $(git -C $GITHUB_WORKSPACE log -1 --oneline)"

      - name: Setup environment (self-hosted)
        run: |
          echo "$HOME/.local/flutter/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/ruby/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Restore vendored WasmRun iOS framework
        timeout-minutes: 15
        run: |
          set -euo pipefail
          # The prebuilt XCFramework is excluded from git. Prefer the local
          # working copy on this self-hosted runner; fall back to the upstream
          # release asset if the local copy is unavailable.
          LOCAL_SRC="/Users/Uladzimir_Klyshevich/git/flutter_agent/vendor/wasm_run_flutter/ios/Frameworks/WasmRun.xcframework"
          DEST="vendor/wasm_run_flutter/ios/Frameworks"
          rm -rf "$DEST/WasmRun.xcframework"
          mkdir -p "$DEST"
          if [ -d "$LOCAL_SRC" ]; then
            echo "Using local framework: $LOCAL_SRC"
            cp -R "$LOCAL_SRC" "$DEST/"
          else
            echo "Local framework not found, downloading from upstream release..."
            curl -L --retry 3 --retry-delay 10 --max-time 600 \
              -o /tmp/WasmRun.xcframework.zip \
              https://github.com/juancastillo0/wasm_run/releases/download/wasm_run-v0.1.0/WasmRun.xcframework.zip
            unzip -q /tmp/WasmRun.xcframework.zip -d "$DEST"
          fi
          ls -la "$DEST/WasmRun.xcframework"

      - name: Validate iOS secrets
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$IOS_P12_BASE64" ]; then
            echo "::error::IOS_P12_BASE64 secret is not set"
            exit 1
          fi
          if [ -z "$IOS_P12_PASSWORD" ]; then
            echo "::error::IOS_P12_PASSWORD secret is not set"
            exit 1
          fi
          if [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "::error::IOS_PROVISIONING_PROFILE_BASE64 secret is not set"
            exit 1
          fi
          echo "All required iOS secrets are present"

      - name: Import certificates and provisioning profile
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          # Create a temporary keychain for this run (same pattern as learn.ai).
          security delete-keychain build.keychain 2>/dev/null || true
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain ~/Library/Keychains/login.keychain-db

          echo "$IOS_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Ensure iOS device SDK is available
        run: |
          set -euo pipefail
          echo "Available iOS SDKs:"
          xcodebuild -showsdks | grep iphoneos || true
          echo "Downloading iOS platform if missing..."
          xcodebuild -downloadPlatform iOS || true
          # The attached device may run a newer iOS than the installed SDK;
          # try to download the matching version. If this fails, the build
          # will still fail with a clearer message.
          xcodebuild -downloadPlatform iOS -buildVersion 26.5 || true

      - name: Create placeholder .env asset
        working-directory: flutter_app
        run: |
          set -euo pipefail
          cat > .env << 'EOF'
          OPENROUTER_API_KEY=
          MODEL_ID=
          BASE_URL=
          HUGGINGFACE_TOKEN=
          EOF

      - name: Build iOS IPA
        working-directory: flutter_app
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          export PATH="/opt/homebrew/opt/ruby/bin:/opt/homebrew/bin:$PATH"
          bundle install

          PROFILE=~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | plutil -extract UUID raw -)
          TEAM_ID=$(security cms -D -i "$PROFILE" 2>/dev/null | plutil -extract TeamIdentifier.0 raw -)
          BUNDLE_ID=$(security cms -D -i "$PROFILE" 2>/dev/null | plutil -extract Entitlements.application-identifier raw - | sed "s/^$TEAM_ID.//")
          PROFILE_NAME=$(security cms -D -i "$PROFILE" 2>/dev/null | plutil -extract Name raw -)
          echo "PROFILE_NAME=$PROFILE_NAME"

          IOS_TEAM_ID="$TEAM_ID" \
          IOS_BUNDLE_ID="$BUNDLE_ID" \
          IOS_PROVISIONING_PROFILE_NAME="$PROFILE_NAME" \
          IOS_SIGNING_IDENTITY="iPhone Distribution" \
          bundle exec fastlane ios build_only

      - name: Verify IPA exists
        run: |
          IPA_PATH=$(find flutter_app/build/ios -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::IPA file not found in flutter_app/build/ios"
            exit 1
          fi
          echo "IPA built successfully: $(ls -la $IPA_PATH)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: flutter_app/build/ios/ipa/*.ipa
          retention-days: 14

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f certificate.p12

  submit-ios:
    name: Submit iOS to TestFlight
    needs: [build-ios]
    runs-on: [self-hosted, macOS, ARM64]
    if: needs.build-ios.result == 'success'
    steps:
      - name: Update local git mirror
        run: |
          set -euo pipefail
          MIRROR="$HOME/actions-runner-yoloit/mirror/flutter_agent_harness.git"
          mkdir -p "$(dirname "$MIRROR")"
          if [ ! -d "$MIRROR" ]; then
            git clone --mirror https://github.com/IstiN/flutter_agent_harness.git "$MIRROR"
          else
            git -C "$MIRROR" fetch origin
          fi

      - name: Checkout repository from local mirror
        run: |
          set -euo pipefail
          MIRROR="$HOME/actions-runner-yoloit/mirror/flutter_agent_harness.git"
          cd /tmp
          rm -rf "$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE"
          git clone --reference "$MIRROR" --depth=1 \
            https://github.com/IstiN/flutter_agent_harness.git "$GITHUB_WORKSPACE"

      - name: Setup environment (self-hosted)
        run: |
          echo "$HOME/.local/flutter/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/ruby/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ipa/

      - name: Install fastlane
        working-directory: flutter_app
        run: bundle install

      - name: Upload IPA to TestFlight
        working-directory: flutter_app
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_KEY_CONTENT:-}" ]; then
            echo "::notice::App Store Connect API key not configured — skipping TestFlight upload (the IPA stays on the GitHub release / artifacts)."
            exit 0
          fi
          IPA_PATH="$(find ipa -name '*.ipa' -type f | head -1)"
          echo "Uploading $IPA_PATH to TestFlight..."
          IOS_IPA_PATH="$IPA_PATH" bundle exec fastlane ios submit_only

  release-mobile:
    name: Create Mobile GitHub Release
    needs: [version, build-android, build-ios]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: |
            android-aab
            ios-ipa
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -laR artifacts/

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail

          AAB=$(find artifacts -name "*.aab" -type f | head -1)
          IPA=$(find artifacts -name "*.ipa" -type f | head -1)
          echo "AAB: $AAB"
          echo "IPA: $IPA"

          ASSETS=()
          [ -n "$AAB" ] && ASSETS+=("$AAB")
          [ -n "$IPA" ] && ASSETS+=("$IPA")

          if gh release view "$RELEASE_TAG" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release $RELEASE_TAG already exists — uploading mobile assets..."
            for asset in "${ASSETS[@]}"; do
              gh release upload "$RELEASE_TAG" "$asset" --clobber --repo ${{ github.repository }}
            done
            echo "✅ Uploaded mobile assets to existing release $RELEASE_TAG"
          else
            printf 'Fa %s run #%s\n\n## Installation\n- **Android**: Download the AAB and upload to Play Store, or use `flutter install`.\n- **iOS**: Download the IPA and upload to TestFlight via Xcode or Transporter.\n- **macOS**: Download the DMG from the macOS build workflow.\n' \
              "$RELEASE_TAG" "${{ github.run_number }}" > release-notes.md

            gh release create "$RELEASE_TAG" \
              --repo ${{ github.repository }} \
              --title "Fa $RELEASE_TAG" \
              --notes-file release-notes.md \
              --latest \
              "${ASSETS[@]}"
            echo "✅ Created release $RELEASE_TAG with mobile assets"
          fi
