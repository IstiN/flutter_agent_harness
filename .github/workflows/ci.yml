name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Coalesced auto-release catch-up: when pushes outpace the 2h coalesce
    # window, this releases the pending commits (pub.dev caps ~12 publishes/day).
    - cron: '23 */2 * * *'

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: dart pub get

      # The example Flutter app lives in this repo; without its package
      # config the repo-wide `dart analyze` cannot resolve Flutter imports.
      - name: Example app pub get (for repo-wide analyze)
        run: cd flutter_app && flutter pub get

      # .env is gitignored but declared as a Flutter asset (flutter_dotenv);
      # without it the analyzer fails with asset_does_not_exist (a fresh
      # clone hits the same warning locally).
      - name: Create placeholder .env for the example app
        run: touch flutter_app/.env

      - name: File size guard (no dart file over 2800 lines)
        run: |
          violations=$(find lib test example -name '*.dart' \
            ! -name '*.g.dart' ! -name '*.freezed.dart' ! -name '*.mocks.dart' \
            -exec sh -c 'lines=$(wc -l < "$1"); if [ "$lines" -gt 2800 ]; then echo "$1: $lines lines"; fi' _ {} \;)
          if [ -n "$violations" ]; then echo "$violations"; exit 1; fi

      - name: dart analyze
        run: dart analyze

      - name: dart test --coverage (excluding integration)
        run: dart test --coverage=coverage --exclude-tags integration

      - name: Format coverage to lcov
        run: dart run coverage:format_coverage --lcov -i coverage -o coverage/lcov.info

      - name: Coverage ratchet (lib/ >= 80%)
        run: python3 scripts/check_coverage.py 80

      - name: Duplication guard (lib/ < 1%)
        run: |
          npx --yes jscpd@5 --min-tokens 50 --min-lines 5 --reporters json \
            --output /tmp/jscpd-ci lib/ || true
          python3 - <<'EOF'
          import json, sys
          try:
              with open('/tmp/jscpd-ci/jscpd-report.json') as f:
                  pct = json.load(f)['statistics']['total']['percentage']
          except Exception:
              pct = 0.0
          print(f'Duplication: {pct}% (threshold < 1.0%)')
          sys.exit(0 if float(pct) < 1.0 else 1)
          EOF

  integration:
    name: Integration tests (LLM)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: dart test --tags integration (skipped without keys)
        run: |
          if [ -z "${OPENROUTER_API_KEY}${ANTHROPIC_API_KEY}${GOOGLE_API_KEY}${OLLAMA_API_KEY}" ]; then
            echo "No LLM API keys configured, skipping integration tests."
            exit 0
          fi
          dart test --tags integration

  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # OIDC — pub.dev verifies the GitHub identity, no secrets
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Verify tag matches pubspec version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=$tag pubspec=$version"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pubspec version $version"
            exit 1
          fi

      - run: dart pub get

      - name: Publish (automated publishing via OIDC)
        run: dart pub publish --force

  binaries:
    name: Build native binaries
    runs-on: ${{ matrix.runner }}
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write # attach assets to the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os: windows
            arch: x64
            ext: .exe
          - runner: macos-latest
            os: macos
            arch: arm64
            ext: ''
          # Intel Mac runner (macos-13 is retired; AOT cannot cross-compile
          # macos_x64 from arm64 — only linux_* targets cross).
          - runner: macos-15-intel
            os: macos
            arch: x64
            ext: ''
          - runner: ubuntu-latest
            os: linux
            arch: x64
            ext: ''
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            ext: ''
            cross: true
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Verify tag matches pubspec version
        # Explicit bash: the default shell on Windows runners is pwsh and
        # the POSIX test below dies there with a ParserError.
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "tag=$tag pubspec=$version"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pubspec version $version"
            exit 1
          fi

      - run: dart pub get

      - name: Build native executable
        shell: bash
        run: |
          out="fa-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "${{ matrix.cross }}" = "true" ]; then
            dart compile exe bin/fah.dart --target-os ${{ matrix.os }} --target-arch ${{ matrix.arch }} -DFA_VERSION="$version" -o "$out"
          else
            dart compile exe bin/fah.dart -DFA_VERSION="$version" -o "$out"
          fi
          ls -lh "$out"

      - name: Upload binary to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="fa-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          # gh release upload needs the release to exist; create it lazily
          # (matrix jobs race here, so a duplicate create is tolerated).
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" --generate-notes \
              --repo "${GITHUB_REPOSITORY}" || true
          fi
          gh release upload "${GITHUB_REF_NAME}" "$asset" --clobber --repo "${GITHUB_REPOSITORY}"

  installer-smoke:
    name: Installer smoke
    # Actually runs the one-line installers on every release: downloads the
    # just-built binary from the release and executes `fa --version`
    # (catches installer syntax/encoding breakage on real Windows shells).
    runs-on: ${{ matrix.os }}
    needs: binaries
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            kind: ps1
          - os: ubuntu-latest
            kind: sh
          - os: macos-latest
            kind: sh
    steps:
      - uses: actions/checkout@v4

      - name: Run the one-line installer (PowerShell)
        if: matrix.kind == 'ps1'
        shell: pwsh
        run: ./site/install.ps1

      - name: Run the one-line installer (sh)
        if: matrix.kind == 'sh'
        shell: bash
        env:
          FA_INSTALL_DIR: ${{ runner.temp }}/fa-bin
        run: sh ./site/install.sh

      - name: Smoke the installed binary (Windows)
        if: matrix.kind == 'ps1'
        shell: pwsh
        run: & "$env:LOCALAPPDATA\Fa\bin\fa.exe" --version

      - name: Smoke the installed binary (Unix)
        if: matrix.kind == 'sh'
        shell: bash
        run: |
          if [ -x "${{ runner.temp }}/fa-bin/fa" ]; then
            "${{ runner.temp }}/fa-bin/fa" --version
          else
            "$HOME/.local/bin/fa" --version
          fi

  release:
    name: Auto-release (patch bump + tag)
    runs-on: ubuntu-latest
    needs: quality
    # Every push to main gets a release with an auto-incremented patch version
    # (0.1.x -> 0.1.y), coalesced to <=1 per 2h — pub.dev rate-limits publishes
    # (~12/day; hit on 2026-07-18). Release commits are skipped (loop guard).
    # Scheduled runs catch up commits that outpaced the coalesce window.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release):'))
      || github.event_name == 'schedule'
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so the pushed tag triggers the publish job —
          # GITHUB_TOKEN pushes never trigger downstream workflow runs.
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump version, changelog, tag and push
        run: bash scripts/auto_release.sh
