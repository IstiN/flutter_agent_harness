name: Pages

# Builds the Flutter web demo (example/flutter_example) into site/app and
# deploys the static landing (site/) to GitHub Pages. Pages source must be
# set to "GitHub Actions" in the repo settings.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'example/flutter_example/**'
      - 'lib/**'
      - 'vendor/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queued runs must not be cancelled mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build landing + web demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Example app pub get
        working-directory: example/flutter_example
        run: flutter pub get

      # .env is gitignored but declared as a Flutter asset (flutter_dotenv);
      # the build fails without it.
      - name: Placeholder .env for the example app
        run: touch example/flutter_example/.env

      - name: Build web demo
        working-directory: example/flutter_example
        run: >-
          flutter build web --release
          --base-href /flutter_agent_harness/app/
          --output ../../build/pages/app

      - name: Assemble Pages artifact
        run: |
          mkdir -p build/pages/root
          cp -R site/. build/pages/root/
          cp -R build/pages/app build/pages/root/app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages/root

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
