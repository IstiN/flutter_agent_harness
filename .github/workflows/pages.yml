name: Pages

# Builds the Flutter web demo (flutter_app) into site/app and
# deploys the static landing (site/) to GitHub Pages. Pages source must be
# set to "GitHub Actions" in the repo settings.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'flutter_app/**'
      - 'lib/**'
      - 'vendor/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; queued runs must not be cancelled mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build landing + web demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Example app pub get
        working-directory: flutter_app
        run: flutter pub get

      # .env is gitignored but declared as a Flutter asset (flutter_dotenv);
      # the build fails without it.
      - name: Placeholder .env for the example app
        run: touch flutter_app/.env

      - name: Build web demo
        working-directory: flutter_app
        run: >-
          flutter build web --release
          --base-href /app/
          --output ../../build/pages/app

      - name: Assemble Pages artifact
        run: |
          mkdir -p build/pages/root
          cp -R site/. build/pages/root/
          cp -R build/pages/app build/pages/root/app

      - name: Cache-bust static assets
        env:
          BUILD_ID: ${{ github.sha }}
        run: |
          # Bust the Flutter demo app's entry scripts so browsers never load a
          # stale flutter_bootstrap.js / helper bundle after a new deploy.
          sed -i -E 's|src="([^\"]+)"|src="\1?v='"${BUILD_ID}"'"|g' build/pages/app/index.html
          # Bust the landing page's own CSS/JS and the demo-app iframe/link.
          sed -i -E 's|href="styles\.css"|href="styles.css?v='"${BUILD_ID}"'"|g' build/pages/root/index.html
          sed -i -E 's|src="main\.js" defer|src="main.js?v='"${BUILD_ID}"'" defer|g' build/pages/root/index.html
          sed -i -E 's|src="\./app/"|src="./app/index.html?v='"${BUILD_ID}"'"|g' build/pages/root/index.html
          sed -i -E 's|href="\./app/" target="_blank"|href="./app/index.html?v='"${BUILD_ID}"'" target="_blank"|g' build/pages/root/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages/root

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
