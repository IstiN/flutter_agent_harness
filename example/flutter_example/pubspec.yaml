name: flutter_agent_example
description: >-
  Flutter example for flutter_agent_harness: a chat UI that runs the agent
  with a mobile ExecutionEnv backed by path_provider and Process.run.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # The local flutter_agent_harness package (pure Dart core + dart:io env).
  flutter_agent_harness:
    path: ../../

  # Mobile-friendly filesystem root and image picking.
  path_provider: ^2.1.6
  image_picker: ^1.2.3

  # Load API keys and runtime config from .env for local dev/simulator runs.
  flutter_dotenv: ^6.0.1

  cupertino_icons: ^1.0.9
  flutter_chat_ui: ^2.11.1
  flutter_markdown: ^0.7.7+1
  http: ^1.6.0
  uuid: ^4.6.0
  flutter_chat_core: ^2.9.0
  yaml: ^3.1.3

  # WASM runtime used to run a uutils/ripgrep shell on iOS/Android/Web.
  wasm_run_flutter: ^0.1.0
  wasm_run: ^0.1.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  freezed_annotation: ^3.1.0
  wasm_run:
    path: ../../vendor/wasm_run
  wasm_run_flutter:
    path: ../../vendor/wasm_run_flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/wasm/add.wasm
    - assets/wasm/coreutils.wasm
    - assets/wasm/rg.wasm
    - assets/wasm/find.wasm
    - assets/wasm/sed.wasm
    - assets/wasm/awk.wasm
    - assets/wasm/tar.wasm
    - assets/wasm/gzip.wasm
    - assets/wasm/zip.wasm
    - assets/wasm/wasi_hello.wasm
    - assets/wasm/LICENSE.coreutils
    - assets/wasm/LICENSE.rg
    - assets/wasm/LICENSE.findutils
    - assets/wasm/LICENSE.sed
    - assets/wasm/LICENSE.awk
    - assets/wasm/LICENSE.tar
    - assets/wasm/LICENSE.gzip
    - assets/wasm/LICENSE.zip
    - assets/wasm/ATTRIBUTION.md

