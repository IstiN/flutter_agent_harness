<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_agent_example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_agent_example</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Branded loading splash: renders before any JS loads, fades out when the
       Flutter engine renders its first frame (`flutter-first-frame` event). -->
  <style>
    body { background: #070a10; }
    #fah-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
      background:
        radial-gradient(720px 480px at 12% -6%, rgba(129, 140, 248, 0.16), transparent 70%),
        radial-gradient(820px 560px at 95% 30%, rgba(94, 234, 212, 0.10), transparent 70%),
        #070a10;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      transition: opacity 0.3s ease;
    }
    #fah-splash.fah-done { opacity: 0; pointer-events: none; }
    #fah-splash .fah-name { color: #e8eef7; font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
    #fah-splash .fah-bar {
      width: 168px; height: 3px; border-radius: 2px;
      background: rgba(148, 163, 184, 0.14); overflow: hidden;
    }
    #fah-splash .fah-bar::after {
      content: ""; display: block; width: 40%; height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, #818cf8, #5eead4);
      animation: fah-shimmer 1.2s ease-in-out infinite;
    }
    @keyframes fah-shimmer {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(430%); }
    }
    @media (prefers-reduced-motion: reduce) {
      #fah-splash { transition: none; }
      #fah-splash .fah-bar::after { animation: none; width: 100%; }
    }
  </style>
  <div id="fah-splash" role="status" aria-label="Loading flutter_agent_harness">
    <svg width="72" height="72" viewBox="0 0 64 64" aria-hidden="true">
      <defs>
        <linearGradient id="fah-g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#818cf8"/>
          <stop offset="1" stop-color="#5eead4"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#fah-g)"/>
      <text x="32" y="41" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="23" font-weight="700" fill="#070a10">&gt;_</text>
    </svg>
    <div class="fah-name">flutter_agent_harness</div>
    <div class="fah-bar"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('fah-splash');
      if (!splash) return;
      splash.classList.add('fah-done');
      splash.addEventListener('transitionend', function () { splash.remove(); }, { once: true });
      // Fallback for reduced motion / missed transitionend.
      setTimeout(function () { splash.remove(); }, 500);
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Stream helper for the on-device WebLLM provider (plain script so the
       Dart side can call it even while the module below is still loading). -->
  <script src="webllm_helpers.js"></script>
  <!-- WebLLM (@mlc-ai/web-llm, pinned): runs small LLMs on-device via WebGPU.
       Loaded as an ES module from jsdelivr and exposed as window.webllm for
       the Dart side (lib/webllm/). Version matches the interop bindings.
       Used chat-only: tool calling is the Dart-side prompt-tools wrapper's
       job, not the engine's native function-calling mode. -->
  <script type="module">
    import * as webllm from 'https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.84/+esm';
    window.webllm = webllm;
  </script>
  <!-- LiteRT-LM web engine for the on-device Gemma provider (.litertlm models
       via @litert-lm/core, pinned — the version matches the interop in
       flutter_gemma_litertlm 1.1.0). The ESM does not assign window globals
       and module scripts are deferred, so the plugin's Dart side awaits the
       window.litertLmReady handshake before any static Engine interop (see
       lib/gemma/ and the flutter_gemma README "Web .litertlm setup"). -->
  <script type="module">
    window.litertLmReady = (async () => {
      const m = await import('https://cdn.jsdelivr.net/npm/@litert-lm/core@0.12.1/+esm');
      window.Engine = m.Engine;
      return m.Engine;
    })();
  </script>
  <!-- flutter_gemma web storage helpers. opfs_helper.js (defines
       window.flutterGemmaOPFS) is required by WebStorageMode.streaming —
       Gemma 4 E2B/E4B exceed Chrome's ~2 GB single-blob limit, so the model
       streams into OPFS and the engine consumes a ReadableStream. The pub
       package does not ship opfs_helper.js; it is vendored here from the
       flutter_gemma repo (interface matches flutter_gemma 1.3.1's
       web_opfs_interop.dart). cache_api.js ships inside the pub package and
       backs the non-streaming fallback paths. -->
  <script src="cache_api.js"></script>
  <script src="opfs_helper.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
