name: flutter_agent_harness
description: >-
  Cross-platform AI agent harness for Dart and Flutter: streaming provider
  adapters, agent loop with tools, session persistence, and context
  compaction. Ported architecture of pi-mono (packages/ai + packages/agent).
version: 0.1.0
repository: https://github.com/IstiN/flutter_agent_harness
issue_tracker: https://github.com/IstiN/flutter_agent_harness/issues
topics:
  - agent
  - llm
  - ai
  - streaming
  - flutter

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  http: ^1.6.0
  meta: ^1.18.0

dev_dependencies:
  coverage: ^1.15.1
  lints: ^6.1.0
  test: ^1.31.2
