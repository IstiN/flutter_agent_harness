name: flutter_agent_harness
description: >-
  Cross-platform AI agent harness for Dart and Flutter: streaming provider
  adapters, agent loop with tools, session persistence, context compaction.
version: 0.1.64
repository: https://github.com/IstiN/flutter_agent_harness
issue_tracker: https://github.com/IstiN/flutter_agent_harness/issues
topics:
  - agent
  - llm
  - ai
  - streaming
  - flutter

# Test fixtures only: fake one-line PEM stubs used by the ssh builtin tests,
# not real keys (https://dart.dev/go/false-secrets).
false_secrets:
  - flutter_app/test/sandbox_ssh_test.dart
  # Tracked example Firebase config: public-by-design client identifiers
  # (see flutter_app/.gitignore), not secrets.
  - flutter_app/lib/firebase_options.dart

environment:
  sdk: '>=3.12.0 <4.0.0'

executables:
  fah: fah
  fa: fah

dependencies:
  archive: ^4.0.9
  dart_tui: ^1.4.0
  http: ^1.6.0
  image: ^4.9.1
  meta: ^1.18.0
  mime: ^2.0.0
  sqlite3: ^2.9.4
  yaml: ^3.1.3

dev_dependencies:
  coverage: ^1.15.1
  lints: ^6.1.0
  pty2: ^0.5.3
  test: ^1.31.2
