name: fa
description: >-
  Fa — the Flutter Agent app: a chat UI that runs the agent with a mobile
  ExecutionEnv backed by path_provider and Process.run.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # The local flutter_agent_harness package (pure Dart core + dart:io env).
  flutter_agent_harness:
    path: ../

  # Mobile-friendly filesystem root and image picking.
  path_provider: ^2.1.6
  image_picker: ^1.2.3

  # Load API keys and runtime config from .env for local dev/simulator runs.
  flutter_dotenv: ^6.0.1

  # JS apps platform: runs JavaScript widgets and renders them as native
  # Flutter UI (QuickJS via flutter_js on VM, web worker on web).
  js_widget_runtime: ^0.4.3

  # SVG app icons (inline markup or apps/<id>/*.svg files).
  flutter_svg: ^2.3.0

  cupertino_icons: ^1.0.9
  flutter_chat_ui: ^2.11.1
  flutter_markdown: ^0.7.7+1
  http: ^1.6.0
  uuid: ^4.6.0
  flutter_chat_core: ^2.9.0
  yaml: ^3.1.3

  # Myers diff used by the pure-Dart diff/patch sandbox builtins.
  diffutil_dart: ^4.0.1

  # Git support for the mobile sandbox: pure-Dart local porcelain (network clone
  # is implemented as a GitHub tarball fallback; full smart HTTP clone is a TODO).
  dart_git:
    git:
      url: https://github.com/GitJournal/dart-git.git
      ref: master

  path: ^1.9.0

  # package:file MemoryFileSystem for the web sandbox git store.
  file: ^7.0.1

  # WASM runtime used to run a uutils/ripgrep shell on iOS/Android/Web.
  wasm_run_flutter: ^0.1.0
  wasm_run: ^0.1.0+2

  # Pure-Dart inflate with exact stream-end tracking, used by git_smart_http
  # to parse packfiles (dart:io zlib cannot report the consumed length).
  # Its XZ/bzip2 decoders also back the sandbox xz/bzip2 -d builtins.
  archive: ^4.0.9

  # MD5/SHA digests for the sandbox md5sum/sha*sum builtins.
  crypto: ^3.0.3
  dartssh2: ^2.22.2

  # On-device Gemma 4 inference (iOS/Android via FFI, web via @litert-lm/core,
  # .litertlm engine). Imported only from lib/gemma/ behind conditional
  # imports — host tests never touch the plugin.
  flutter_gemma: ^1.3.1
  flutter_gemma_litertlm: ^1.1.0

  # Pinned explicitly because lib/gemma/gemma_web_registration_web.dart
  # imports them directly: dart2js release builds tree-shake the generated
  # web plugin registrant's platform-instance assignments out, so the Gemma
  # web path re-registers FlutterGemmaWeb and the SharedPreferences web impl
  # from its own retained code (see that file's docstring).
  shared_preferences_web: ^2.4.3
  shared_preferences_platform_interface: ^2.4.1

  # In-app HTML file preview on mobile/desktop (web uses an iframe instead —
  # see lib/html_preview_web.dart).
  webview_flutter: ^4.14.1

  # Firebase: analytics across iOS, Android, macOS, and web.
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

dependency_overrides:
  freezed_annotation: ^3.1.0
  wasm_run:
    path: ../vendor/wasm_run
  wasm_run_flutter:
    path: ../vendor/wasm_run_flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/apps/animation-showcase/
    - assets/apps/calculator/
    - assets/apps/crypto/
    - assets/apps/stocks/
    - assets/apps/weather/
    - assets/apps/yolo-hello/
    - assets/skills/js-apps/SKILL.md
    - assets/wasm/add.wasm
    - assets/wasm/coreutils.wasm
    - assets/wasm/rg.wasm
    - assets/wasm/find.wasm
    - assets/wasm/sed.wasm
    - assets/wasm/awk.wasm
    - assets/wasm/tar.wasm
    - assets/wasm/gzip.wasm
    - assets/wasm/zip.wasm
    - assets/wasm/python.wasm
    - assets/wasm/python_stdlib.zip
    - assets/wasm/qjs.wasm
    - assets/wasm/sqlite3.wasm
    - assets/wasm/lua.wasm
    - assets/wasm/wasi_hello.wasm
    - assets/wasm/LICENSE.coreutils
    - assets/wasm/LICENSE.rg
    - assets/wasm/LICENSE.findutils
    - assets/wasm/LICENSE.sed
    - assets/wasm/LICENSE.awk
    - assets/wasm/LICENSE.tar
    - assets/wasm/LICENSE.gzip
    - assets/wasm/LICENSE.zip
    - assets/wasm/LICENSE.python
    - assets/wasm/LICENSE.quickjs
    - assets/wasm/LICENSE.lua
    - assets/wasm/ATTRIBUTION.md

flutter_launcher_icons:
  image_path: "assets/app_icon_source.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#0b0f16"
  adaptive_icon_foreground: "assets/app_icon_source.png"
  macos:
    generate: true
  web:
    generate: false
  windows:
    generate: false
  linux:
    generate: false

